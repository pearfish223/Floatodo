<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 36px;
      height: 36px;
      background: transparent !important;
      overflow: hidden;
      user-select: none;
    }

    .bubble {
      width: 36px;
      height: 36px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      clip-path: circle(50%);
      animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bubble:active { cursor: grabbing; }

    @keyframes popIn {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    #customAvatar {
      width: 36px;
      height: 36px;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    #catSvg {
      width: 28px;
      height: 28px;
      display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bubble" id="bubble">
    <!-- 优先显示自定义图片，失败则显示猫咪 -->
    <img id="customAvatar" src="bubble-avatar.png"
         onerror="this.style.display='none'; document.getElementById('catSvg').style.display='block'" />
    <svg id="catSvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon points="18,42 10,12 36,36" fill="#f0f0f0" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
      <polygon points="82,42 90,12 64,36" fill="#f0f0f0" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="50" cy="60" r="36" fill="white" stroke="#222" stroke-width="2.5"/>
      <ellipse cx="36" cy="57" rx="6.5" ry="7.5" fill="#1a1a1a"/>
      <circle cx="38" cy="54" r="2.2" fill="white"/>
      <ellipse cx="64" cy="57" rx="6.5" ry="7.5" fill="#1a1a1a"/>
      <circle cx="66" cy="54" r="2.2" fill="white"/>
      <ellipse cx="50" cy="68" rx="3.5" ry="2.5" fill="#555"/>
      <path d="M45,71 Q50,76 55,71" fill="none" stroke="#444" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="10" y1="66" x2="40" y2="68" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="10" y1="71" x2="40" y2="70" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="60" y1="68" x2="90" y2="66" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="60" y1="70" x2="90" y2="71" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
  </div>

  <script>
    let isDown = false, offsetX = 0, offsetY = 0
    let moved = false, lastUp = 0

    document.addEventListener('mousedown', e => {
      isDown = true
      moved = false
      offsetX = e.clientX
      offsetY = e.clientY
    })

    document.addEventListener('mousemove', e => {
      if (!isDown) return
      moved = true
      window.api.moveWindow(e.screenX - offsetX, e.screenY - offsetY)
    })

    document.addEventListener('mouseup', () => {
      isDown = false
      if (!moved) {
        const now = Date.now()
        if (now - lastUp < 400) window.api.restoreMain()
        lastUp = now
      }
      moved = false
    })
  </script>
</body>
</html>
